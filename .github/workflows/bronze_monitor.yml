name: Bronze Layer Validation

on:
  schedule:
    # Roda a cada 1 hora (ajuste conforme necessário)
    # Formato: minuto hora dia mês dia-da-semana (UTC)
    # Exemplos:
    # - cron: "*/15 * * * *"  # → a cada 15 minutos
    #   "0 * * * *"     → a cada hora
    #   "0 8 * * *"     → todo dia às 08:00 UTC (05:00 Brasília)
    - cron: "0 * * * *"

  # Permite rodar manualmente pelo GitHub (botão "Run workflow")
  workflow_dispatch:

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necessário para fazer push do index.html

    steps:

      # 1. Baixa o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instala dependências
      - name: Instalar dependências
        run: |
          pip install \
            azure-storage-file-datalake \
            pandas \
            pyarrow \
            python-dotenv

      # 4. Roda a validação e gera o index.html atualizado
      - name: Rodar validação Bronze
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY:     ${{ secrets.AZURE_STORAGE_KEY }}
          ALERT_EMAIL_FROM:      ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASS:      ${{ secrets.ALERT_EMAIL_PASS }}
          ALERT_EMAIL_TO:        ${{ secrets.ALERT_EMAIL_TO }}
        run: python generate_dashboard.py

      # 5. Faz push do index.html e last_run.json atualizados para o repositório
      #    → GitHub Pages publica automaticamente em seguida
      - name: Publicar dashboard atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html last_run.json
          git diff --staged --quiet || git commit -m "🤖 Auto-update: Bronze validation $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
