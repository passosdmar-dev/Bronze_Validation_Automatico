name: Bronze Layer Validation

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install \
            azure-storage-file-datalake \
            pandas \
            pyarrow \
            python-dotenv

      - name: Rodar validação Bronze
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY:     ${{ secrets.AZURE_STORAGE_KEY }}
          ALERT_EMAIL_FROM:      ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASS:      ${{ secrets.ALERT_EMAIL_PASS }}
          ALERT_EMAIL_TO:        ${{ secrets.ALERT_EMAIL_TO }}
        run: python generate_dashboard.py

      - name: Publicar dashboard atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html last_run.json history.json
          git diff --staged --quiet || git commit -m "🤖 Auto-update: Bronze validation $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
